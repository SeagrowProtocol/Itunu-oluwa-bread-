<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITUNU OLUWA BREAD | Delivery + Balance Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
body { font-family: 'Outfit', sans-serif; background: #faf9f7; }
h1, h2, h3 { font-family: 'Playfair Display', serif; }
.glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.06); }
.big-text { font-size: 3rem; line-height: 1; }
@media (max-width: 640px) {.big-text { font-size: 2rem; }}
.balance-up { color: #16a34a; }.balance-down { color: #dc2626; }
</style>
</head>
<body class="text-stone-900">

<nav class="glass fixed top-0 w-full z-[100] px-6 py-4 shadow-sm">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🍞</span>
      <div class="text-2xl font-black tracking-tight uppercase">ITUNU OLUWA <span class="text-orange-600 italic">BREAD</span></div>
    </div>
    <button onclick="showCustomerManager()" class="bg-stone-900 text-white px-6 py-3 rounded-full font-bold hover:bg-orange-600 transition">
      <i class="fas fa-users"></i> Customers
    </button>
  </div>
</nav>

<main class="pt-32 pb-20 px-6">
  <div class="max-w-7xl mx-auto space-y-8">

    <!-- DATE PICKER -->
    <div class="glass p-6 rounded-3xl shadow-lg">
      <label class="block text-sm font-black uppercase text-stone-500 mb-2 tracking-widest">Select Date</label>
      <input type="date" id="datePicker" onchange="changeDate()" class="p-4 rounded-xl border-2 border-stone-100 font-black text-xl">
      <button onclick="setToday()" class="ml-3 bg-orange-600 text-white px-6 py-4 rounded-xl font-bold">Today</button>
    </div>

    <!-- 1. DAILY LOAD -->
    <section class="glass p-8 md:p-12 rounded-3xl shadow-xl">
      <div class="flex items-center gap-4 mb-8">
        <i class="fas fa-warehouse text-4xl text-orange-600"></i>
        <h2 class="text-4xl font-black">1. Load From Home</h2>
      </div>
      <div class="grid md:grid-cols-6 gap-4 mb-8" id="homeLoadInputs"></div>
      <div class="bg-orange-50 p-8 rounded-3xl text-center border-2 border-orange-200">
        <p class="text-sm font-black uppercase tracking-widest text-orange-700 mb-2">Total Load Value</p>
        <h3 class="big-text font-black text-stone-900 mb-4" id="homeLoadTotal">#0</h3>
        <button onclick="saveHomeLoad()" class="bg-orange-600 text-white px-10 py-4 rounded-2xl font-black text-lg hover:bg-stone-900 transition shadow-lg">
          <i class="fas fa-truck-loading"></i> Save Load
        </button>
      </div>
    </section>

    <!-- 2. DAILY SUMMARY -->
    <section class="glass p-8 md:p-12 rounded-3xl shadow-xl bg-stone-900 text-white">
      <div class="flex items-center gap-4 mb-8">
        <i class="fas fa-calculator text-4xl text-orange-400"></i>
        <h2 class="text-4xl font-black">2. Daily Summary</h2>
      </div>
      <div class="grid md:grid-cols-3 gap-6 text-center mb-8">
        <div class="bg-white/10 p-6 rounded-2xl">
          <p class="text-xs uppercase tracking-widest text-orange-300 mb-2">Total Load</p>
          <h3 class="big-text font-black" id="summaryLoad">#0</h3>
        </div>
        <div class="bg-white/10 p-6 rounded-2xl">
          <p class="text-xs uppercase tracking-widest text-orange-300 mb-2">Total Sales</p>
          <h3 class="big-text font-black" id="summarySales">#0</h3>
        </div>
        <div class="bg-white/10 p-6 rounded-2xl">
          <p class="text-xs uppercase tracking-widest text-orange-300 mb-2">Cash Balance</p>
          <h3 class="big-text font-black" id="summaryBalance">#0</h3>
        </div>
      </div>
      <h4 class="font-black text-xl mb-4 text-orange-300">Bread Balance Left</h4>
      <div class="grid md:grid-cols-6 gap-4" id="balanceGrid"></div>
    </section>

    <!-- 3. CUSTOMER DELIVERY -->
    <section class="glass p-8 md:p-12 rounded-3xl shadow-xl">
      <div class="flex items-center gap-4 mb-8">
        <i class="fas fa-route text-4xl text-orange-600"></i>
        <h2 class="text-4xl font-black">3. Deliver To Customer</h2>
      </div>
      <div class="mb-8">
        <label class="block text-sm font-black uppercase text-stone-500 mb-3 tracking-widest">Select Customer</label>
        <select id="customerSelect" onchange="loadCustomer()" class="w-full p-5 rounded-2xl bg-stone-50 border-2 border-stone-100 font-black text-2xl outline-none"></select>
      </div>
      <div id="customerPanel" class="hidden">
        <h3 class="text-3xl font-black mb-6">Order for <span id="activeCustomer" class="text-orange-600 italic text-4xl"></span></h3>
        <div class="grid md:grid-cols-6 gap-4 mb-8" id="customerInputs"></div>
        <div class="bg-stone-900 text-white p-8 rounded-3xl text-center">
          <p class="text-xs font-black uppercase tracking-widest text-orange-300 mb-2">Order Total</p>
          <h3 class="big-text font-black mb-4" id="customerTotal">#0</h3>
          <button onclick="saveCustomerOrder()" class="bg-orange-600 px-12 py-5 rounded-2xl font-black text-xl hover:bg-white hover:text-stone-900 transition shadow-lg">
            <i class="fas fa-check-circle"></i> Save Order
          </button>
        </div>
        <div class="mt-10">
          <h4 class="font-black text-xl mb-4">Order Records for <span id="recordDate"></span></h4>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="text-xs uppercase text-stone-500 font-black tracking-widest border-b-2 border-stone-200">
                <tr><th class="pb-3">Time</th><th class="pb-3">Customer</th><th class="pb-3">Qty 6x</th><th class="pb-3">Amount</th><th class="pb-3">Action</th></tr>
              </thead>
              <tbody id="orderRecords"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

  </div>
</main>

<!-- Customer Manager Modal -->
<div id="customerModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6">
  <div class="glass rounded-3xl p-8 max-w-lg w-full shadow-2xl">
    <h3 class="text-3xl font-black mb-6">Manage Customers</h3>
    <div class="flex gap-3 mb-6">
      <input id="newCustomer" placeholder="Customer Name" class="flex-1 p-4 rounded-xl border-2 border-stone-100 font-bold text-lg">
      <button onclick="addCustomer()" class="bg-orange-600 text-white px-8 py-4 rounded-xl font-black">Add</button>
    </div>
    <div id="customerList" class="space-y-3 max-h-80 overflow-y-auto"></div>
    <button onclick="closeModal()" class="mt-6 w-full bg-stone-200 py-4 rounded-xl font-black">Close</button>
  </div>
</div>

<script>
const BREADS = [
  {name: "Premium Jumbo", price: 1100},
  {name: "Special Family", price: 900},
  {name: "Standard Medium", price: 550},
  {name: "Standard Small", price: 450},
  {name: "Mini Economy", price: 350},
  {name: "Snack Size", price: 270}
];

let customers = JSON.parse(localStorage.getItem('itunuCustomers') || '[]');
let dailyData = JSON.parse(localStorage.getItem('itunuDailyData') || '{}');
let activeCustomer = null;
let currentDate = new Date().toISOString().split('T')[0];

// INIT
function init() {
  document.getElementById('datePicker').value = currentDate;
  renderInputs();
  loadCustomerDropdown();
  loadDayData();
  setToday();
}

function getDayData() {
  if (!dailyData[currentDate]) {
    dailyData[currentDate] = {load: [0,0,0,0,0,0], orders: []};
  }
  return dailyData[currentDate];
}

function saveDayData() {
  localStorage.setItem('itunuDailyData', JSON.stringify(dailyData));
}

function renderInputs() {
  const loadWrap = document.getElementById('homeLoadInputs');
  loadWrap.innerHTML = BREADS.map((b, i) => `
    <div class="bg-stone-50 p-4 rounded-2xl">
      <label class="block text-xs font-black uppercase text-stone-500 mb-1">${b.name}</label>
      <p class="text-lg font-black text-orange-600 mb-2">#${b.price.toLocaleString()}</p>
      <input type="number" id="loadQty${i}" value="0" min="0" oninput="calcHomeLoad()"
        class="w-full p-3 rounded-xl border-2 border-stone-100 font-black text-2xl outline-none">
    </div>
  `).join('');

  const custWrap = document.getElementById('customerInputs');
  custWrap.innerHTML = BREADS.map((b, i) => `
    <div class="bg-stone-50 p-4 rounded-2xl">
      <label class="block text-xs font-black uppercase text-stone-500 mb-1">${b.name}</label>
      <p class="text-lg font-black text-orange-600 mb-2">#${b.price.toLocaleString()}</p>
      <input type="number" id="custQty${i}" value="0" min="0" oninput="calcCustomerTotal()"
        class="w-full p-3 rounded-xl border-2 border-stone-100 font-black text-2xl outline-none">
    </div>
  `).join('');
}

// DATE HANDLING
function changeDate() {
  currentDate = document.getElementById('datePicker').value;
  loadDayData();
}

function setToday() {
  currentDate = new Date().toISOString().split('T')[0];
  document.getElementById('datePicker').value = currentDate;
  loadDayData();
}

// LOAD SECTION
function calcHomeLoad() {
  const data = getDayData();
  data.load = BREADS.map((_, i) => parseInt(document.getElementById(`loadQty${i}`).value) || 0);
  const total = BREADS.reduce((sum, b, i) => sum + b.price * data.load[i], 0);
  document.getElementById('homeLoadTotal').innerText = '#' + total.toLocaleString();
  updateSummary();
}

function saveHomeLoad() {
  calcHomeLoad();
  saveDayData();
  alert('Load saved for ' + currentDate);
}

// CUSTOMER SECTION
function loadCustomerDropdown() {
  const sel = document.getElementById('customerSelect');
  sel.innerHTML = '<option value="">-- Choose Customer --</option>';
  customers.forEach((c, i) => sel.innerHTML += `<option value="${i}">${c.name}</option>`);
}

function loadCustomer() {
  const idx = document.getElementById('customerSelect').value;
  if (idx === '') {
    document.getElementById('customerPanel').classList.add('hidden');
    return;
  }
  activeCustomer = customers[idx];
  document.getElementById('activeCustomer').innerText = activeCustomer.name;
  document.getElementById('recordDate').innerText = currentDate;
  document.getElementById('customerPanel').classList.remove('hidden');
  BREADS.forEach((_, i) => document.getElementById(`custQty${i}`).value = 0);
  calcCustomerTotal();
  loadOrderRecords();
}

function calcCustomerTotal() {
  let total = BREADS.reduce((sum, b, i) => {
    return sum + b.price * (parseInt(document.getElementById(`custQty${i}`).value) || 0);
  }, 0);
  document.getElementById('customerTotal').innerText = '#' + total.toLocaleString();
}

function saveCustomerOrder() {
  if (!activeCustomer) return;
  const data = getDayData();
  const qtys = BREADS.map((_, i) => parseInt(document.getElementById(`custQty${i}`).value) || 0);
  const total = BREADS.reduce((sum, b, i) => sum + b.price * qtys[i], 0);

  data.orders.push({id: Date.now(), time: new Date().toLocaleTimeString('en-NG'), customer: activeCustomer.name, qtys, total});
  saveDayData();

  BREADS.forEach((_, i) => document.getElementById(`custQty${i}`).value = 0);
  calcCustomerTotal();
  loadOrderRecords();
  updateSummary();
  alert('Order saved for ' + activeCustomer.name);
}

function loadOrderRecords() {
  const data = getDayData();
  const tbody = document.getElementById('orderRecords');
  if (data.orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-stone-400">No orders yet for this date</td></tr>';
    return;
  }
  tbody.innerHTML = data.orders.map(o => `
    <tr class="border-b border-stone-100">
      <td class="py-3 font-bold text-sm">${o.time}</td>
      <td class="py-3 font-bold">${o.customer}</td>
      <td class="py-3">${o.qtys.join(', ')}</td>
      <td class="py-3 font-black text-lg">#${o.total.toLocaleString()}</td>
      <td class="py-3">
        <button onclick="deleteOrder(${o.id})" class="text-red-500 font-bold">Delete</button>
      </td>
    </tr>
  `).join('');
}

function deleteOrder(id) {
  const data = getDayData();
  data.orders = data.orders.filter(o => o.id!== id);
  saveDayData();
  loadOrderRecords();
  updateSummary();
}

// DAILY SUMMARY + BALANCE
function updateSummary() {
  const data = getDayData();

  // Total load value
  const loadValue = BREADS.reduce((sum, b, i) => sum + b.price * data.load[i], 0);
  document.getElementById('summaryLoad').innerText = '#' + loadValue.toLocaleString();

  // Total sales value
  const salesValue = data.orders.reduce((sum, o) => sum + o.total, 0);
  document.getElementById('summarySales').innerText = '#' + salesValue.toLocaleString();

  // Cash balance
  const balance = loadValue - salesValue;
  document.getElementById('summaryBalance').innerText = '#' + balance.toLocaleString();

  // Bread balance per type
  const sold = [0,0,0,0,0,0];
  data.orders.forEach(o => o.qtys.forEach((q, i) => sold[i] += q));
  const balanceGrid = document.getElementById('balanceGrid');

  balanceGrid.innerHTML = BREADS.map((b, i) => {
    const remaining = data.load[i] - sold[i];
    const cls = remaining >= 0? 'balance-up' : 'balance-down';
    return `
      <div class="bg-white/10 p-4 rounded-xl text-center">
        <p class="text-xs uppercase text-orange-300 mb-1">${b.name}</p>
        <p class="text-2xl font-black ${cls}">${remaining}</p>
        <p class="text-xs text-stone-300">Load:${data.load[i]} Sold:${sold[i]}</p>
      </div>
    `;
  }).join('');
}

function loadDayData() {
  const data = getDayData();
  BREADS.forEach((_, i) => document.getElementById(`loadQty${i}`).value = data.load[i]);
  calcHomeLoad();
  loadOrderRecords();
  document.getElementById('customerPanel').classList.add('hidden');
}

// CUSTOMER MANAGER
function showCustomerManager() {
  document.getElementById('customerModal').classList.remove('hidden');
  renderCustomerList();
}

function closeModal() {
  document.getElementById('customerModal').classList.add('hidden');
}

function addCustomer() {
  const name = document.getElementById('newCustomer').value.trim();
  if (!name) return;
  customers.push({name, orders: []});
  localStorage.setItem('itunuCustomers', JSON.stringify(customers));
  document.getElementById('newCustomer').value = '';
  loadCustomerDropdown();
  renderCustomerList();
}

function renderCustomerList() {
  const div = document.getElementById('customerList');
  div.innerHTML = customers.map((c, i) => `
    <div class="flex justify-between items-center bg-stone-50 p-4 rounded-xl">
      <span class="font-bold text-lg">${c.name}</span>
      <button onclick="removeCustomer(${i})" class="text-red-500 font-bold">Delete</button>
    </div>
  `).join('');
}

function removeCustomer(i) {
  if (confirm('Delete customer?')) {
    customers.splice(i, 1);
    localStorage.setItem('itunuCustomers', JSON.stringify(customers));
    loadCustomerDropdown();
    renderCustomerList();
    document.getElementById('customerPanel').classList.add('hidden');
  }
}

init();
</script>
</body>
</html>

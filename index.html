<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITUNU OLUWA BREAD | Sales Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
body { font-family: 'Outfit', sans-serif; background-color: #fbfaf8; }
h1, h2, h3 { font-family: 'Playfair Display', serif; }
.glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
.bread-row input:focus { border-color: #ea580c; }
</style>
</head>
<body class="text-stone-900 leading-relaxed">

<nav class="glass-nav fixed top-0 w-full z-[100] px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🍞</span>
      <div class="text-xl font-extrabold tracking-tighter text-stone-900 uppercase">ITUNU OLUWA <span class="text-orange-600 italic">BREAD</span></div>
    </div>
    <button onclick="showCustomerManager()" class="bg-stone-900 text-white px-5 py-2.5 rounded-full font-bold hover:bg-orange-600 transition">
      <i class="fas fa-users"></i> Customers
    </button>
  </div>
</nav>

<section class="pt-32 pb-20 px-6">
  <div class="max-w-5xl mx-auto">

    <!-- Customer Select -->
    <div class="bg-white p-8 rounded-[3rem] border-stone-100 shadow-xl mb-8">
      <h2 class="text-3xl font-black mb-6">Select Customer</h2>
      <select id="customerSelect" onchange="loadCustomer()" class="w-full p-4 rounded-2xl bg-stone-50 border-2 border-stone-100 font-bold text-lg outline-none">
        <option value="">-- Pick Customer --</option>
      </select>
    </div>

    <!-- Calculator Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="bg-white p-8 md:p-12 rounded-[3rem] border-stone-100 shadow-xl mb-8">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black">Order for <span id="currentCustomer" class="text-orange-600 italic"></span></h2>
          <span class="text-sm text-stone-500 font-bold" id="todayDate"></span>
        </div>

        <!-- 6 Bread Types -->
        <div class="grid md:grid-cols-2 gap-6 mb-8" id="breadInputs">
          <!-- JS will inject rows here -->
        </div>

        <!-- Total -->
        <div class="bg-orange-50 p-8 rounded-[2.5rem] text-center">
          <p class="text-stone-600 text-xs font-black uppercase mb-2 tracking-widest">Total Amount</p>
          <h3 class="text-6xl font-black text-stone-900 mb-4" id="totalPrice">#0</h3>
          <button onclick="saveOrder()" class="bg-orange-600 text-white px-12 py-4 rounded-2xl font-black hover:bg-stone-900 transition shadow-lg">
            <i class="fas fa-save"></i> Save Order
          </button>
        </div>
      </div>

      <!-- Records Table -->
      <div class="bg-white p-8 rounded-[3rem] border-stone-100 shadow-xl">
        <h3 class="text-2xl font-black mb-6">Order Records</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="border-b-2 border-stone-100 text-xs uppercase text-stone-500 font-black tracking-widest">
                <th class="pb-3">Date</th>
                <th class="pb-3">Quantities 6x</th>
                <th class="pb-3">Total</th>
                <th class="pb-3">Action</th>
              </tr>
            </thead>
            <tbody id="recordsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Customer Manager Modal -->
<div id="customerModal" class="hidden fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-6">
  <div class="bg-white rounded-[3rem] p-8 max-w-md w-full">
    <h3 class="text-2xl font-black mb-6">Manage Customers</h3>
    <div class="flex gap-3 mb-6">
      <input id="newCustomerName" placeholder="Customer Name" class="flex-1 p-3 rounded-xl border-2 border-stone-100 font-bold">
      <button onclick="addCustomer()" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-bold">Add</button>
    </div>
    <div id="customerList" class="space-y-2 max-h-60 overflow-y-auto"></div>
    <button onclick="closeModal()" class="mt-6 w-full bg-stone-200 py-3 rounded-xl font-bold">Close</button>
  </div>
</div>

<script>
// 6 Bread types with prices
const BREADS = [
  {name: "Premium Jumbo", price: 1100},
  {name: "Special Family", price: 900},
  {name: "Standard Medium", price: 550},
  {name: "Standard Small", price: 450},
  {name: "Mini Economy", price: 350},
  {name: "Snack Size", price: 270}
];

let customers = JSON.parse(localStorage.getItem('itunuCustomers') || '[]');
let currentCustomer = null;

// Init
function init() {
  document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-NG');
  loadCustomerSelect();
  renderBreadInputs();
}

function loadCustomerSelect() {
  const select = document.getElementById('customerSelect');
  select.innerHTML = '<option value="">-- Pick Customer --</option>';
  customers.forEach((c, i) => {
    select.innerHTML += `<option value="${i}">${c.name}</option>`;
  });
}

function renderBreadInputs() {
  const container = document.getElementById('breadInputs');
  container.innerHTML = BREADS.map((b, i) => `
    <div class="bread-row bg-stone-50 p-4 rounded-2xl">
      <label class="block text-xs font-black uppercase text-stone-500 mb-2">${b.name} - #${b.price.toLocaleString()}</label>
      <input type="number" id="qty${i}" value="0" min="0" oninput="updateTotal()" class="w-full p-3 rounded-xl border-2 border-stone-100 font-black text-2xl outline-none">
    </div>
  `).join('');
}

function loadCustomer() {
  const idx = document.getElementById('customerSelect').value;
  if(idx === '') {
    document.getElementById('dashboard').classList.add('hidden');
    return;
  }
  currentCustomer = customers[idx];
  document.getElementById('currentCustomer').innerText = currentCustomer.name;
  document.getElementById('dashboard').classList.remove('hidden');
  BREADS.forEach((_, i) => document.getElementById(`qty${i}`).value = 0);
  updateTotal();
  loadRecords();
}

function updateTotal() {
  let total = 0;
  BREADS.forEach((b, i) => {
    const qty = parseInt(document.getElementById(`qty${i}`).value) || 0;
    total += b.price * qty;
  });
  document.getElementById('totalPrice').innerText = '#' + total.toLocaleString();
}

function saveOrder() {
  if(!currentCustomer) return;
  const qtys = BREADS.map((_, i) => parseInt(document.getElementById(`qty${i}`).value) || 0);
  const total = BREADS.reduce((sum, b, i) => sum + b.price * qtys[i], 0);

  const order = {
    id: Date.now(),
    date: new Date().toLocaleString('en-NG'),
    qtys: qtys,
    total: total
  };

  currentCustomer.orders = currentCustomer.orders || [];
  currentCustomer.orders.unshift(order);
  localStorage.setItem('itunuCustomers', JSON.stringify(customers));

  BREADS.forEach((_, i) => document.getElementById(`qty${i}`).value = 0);
  updateTotal();
  loadRecords();
  alert('Order saved!');
}

function loadRecords() {
  const tbody = document.getElementById('recordsTable');
  if(!currentCustomer.orders || currentCustomer.orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-stone-400">No records yet</td></tr>';
    return;
  }

  tbody.innerHTML = currentCustomer.orders.map(order => `
    <tr class="border-b border-stone-100">
      <td class="py-4 text-sm font-bold">${order.date}</td>
      <td class="py-4 text-sm">${order.qtys.join(', ')}</td>
      <td class="py-4 font-black">#${order.total.toLocaleString()}</td>
      <td class="py-4">
        <button onclick="editOrder(${order.id})" class="text-orange-600 font-bold text-sm mr-3">Edit</button>
        <button onclick="deleteOrder(${order.id})" class="text-red-500 font-bold text-sm">Delete</button>
      </td>
    </tr>
  `).join('');
}

function editOrder(id) {
  const order = currentCustomer.orders.find(o => o.id === id);
  order.qtys.forEach((q, i) => document.getElementById(`qty${i}`).value = q);
  updateTotal();
  deleteOrder(id, false);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function deleteOrder(id, refresh = true) {
  currentCustomer.orders = currentCustomer.orders.filter(o => o.id!== id);
  localStorage.setItem('itunuCustomers', JSON.stringify(customers));
  if(refresh) loadRecords();
}

// Customer Manager
function showCustomerManager() {
  document.getElementById('customerModal').classList.remove('hidden');
  renderCustomerList();
}

function closeModal() {
  document.getElementById('customerModal').classList.add('hidden');
}

function addCustomer() {
  const name = document.getElementById('newCustomerName').value.trim();
  if(name === '') return;
  customers.push({name: name, orders: []});
  localStorage.setItem('itunuCustomers', JSON.stringify(customers));
  document.getElementById('newCustomerName').value = '';
  loadCustomerSelect();
  renderCustomerList();
}

function renderCustomerList() {
  const div = document.getElementById('customerList');
  div.innerHTML = customers.map((c, i) => `
    <div class="flex justify-between items-center bg-stone-50 p-3 rounded-xl">
      <span class="font-bold">${c.name}</span>
      <button onclick="deleteCustomer(${i})" class="text-red-500 text-sm font-bold">Delete</button>
    </div>
  `).join('');
}

function deleteCustomer(i) {
  if(confirm('Delete customer and all records?')) {
    customers.splice(i, 1);
    localStorage.setItem('itunuCustomers', JSON.stringify(customers));
    loadCustomerSelect();
    renderCustomerList();
    document.getElementById('dashboard').classList.add('hidden');
  }
}

init();
</script>
</body>
</html>
